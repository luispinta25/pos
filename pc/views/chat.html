                <input id="chatNewPhone" class="chat-new-input" type="tel" placeholder="Nuevo numero WhatsApp">
                <button id="chatStartBtn" class="chat-start-btn" type="button" title="Abrir chat">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
        </div>
    </aside>

    <section class="chat-panel">
        <div class="chat-panel-top">
            <div>
                <div id="chatSelectedName" class="chat-selected-name">Selecciona una conversacion</div>
                <div id="chatSelectedMeta" class="chat-selected-meta">Los mensajes nuevos apareceran aqui al refrescar.</div>
            </div>
            <button id="chatPanelReloadBtn" class="chat-icon-btn chat-refresh" type="button" title="Refrescar mensajes">
                <i class="fas fa-rotate-right"></i>
            </button>
        </div>
        <div id="chatMessages" class="chat-messages"></div>
        <form id="chatComposer" class="chat-composer">
            <div id="chatImagePreview" class="chat-image-preview">
                <img id="chatImagePreviewImg" alt="Vista previa">
                <div id="chatImagePreviewName" class="chat-image-preview-name"></div>
                <button id="chatImagePreviewRemove" class="chat-image-preview-remove" type="button" title="Quitar imagen">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="chatQuickReplies" class="chat-quick-replies" aria-label="Respuestas rapidas"></div>
            <textarea id="chatMessageInput" class="chat-composer-text" placeholder="Escribe una respuesta..." disabled></textarea>
            <button id="chatQuoteBtn" class="chat-attach-btn" type="button" disabled title="Atender cotizacion">
                <i class="fas fa-clipboard-list"></i>
            </button>
            <button id="chatAttachBtn" class="chat-attach-btn" type="button" disabled title="Adjuntar imagen">
                <i class="fas fa-image"></i>
            </button>
            <button id="chatSendBtn" class="chat-send-btn" type="submit" disabled title="Enviar">
                <i class="fas fa-paper-plane"></i>
            </button>
            <input id="chatImageInput" type="file" accept="image/*" hidden>
        </form>
    </section>
    <div id="chatImageModal" class="chat-image-modal">
        <img id="chatImageModalImg" alt="Imagen de WhatsApp">
    </div>
    <div id="chatForwardModal" class="chat-forward-modal">
        <div class="chat-forward-card">
            <div class="chat-forward-head">
                <div>
                    <div class="chat-forward-title">Reenviar mensaje</div>
                    <div id="chatForwardPreview" class="chat-forward-preview"></div>
                </div>
                <button id="chatForwardClose" class="chat-forward-close" type="button" title="Cerrar">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="chat-forward-search-wrap">
                <input id="chatForwardSearch" class="chat-forward-search" type="search" placeholder="Buscar cliente, proveedor o numero">
            </div>
            <div id="chatForwardList" class="chat-forward-list"></div>
        </div>
    </div>
    <div id="chatQuoteModal" class="chat-forward-modal">
        <div class="chat-forward-card">
            <div class="chat-forward-head">
                <div>
                    <div id="chatQuoteTitle" class="chat-forward-title">Atender cotizacion</div>
                    <div id="chatQuotePreview" class="chat-forward-preview"></div>
                </div>
                <button id="chatQuoteClose" class="chat-forward-close" type="button" title="Cerrar">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="chatQuoteContent" class="chat-quote-form"></div>
        </div>
    </div>
</div>

<script>
function initChat() {
    const CACHE_CONTACT_LIMIT = 6;
    const CACHE_MESSAGE_LIMIT = 25;
    const PAGE_SIZE = 25;

    const state = {
        conversations: [],
        selected: null,
        messages: [],
        messagesByConversation: {},
        pendingMessages: [],
        pendingImage: null,
        forwardingMessage: null,
        forwardTargets: [],
        forwardSearchTimer: null,
        quoteContext: null,
        hasMoreMessages: false,
        loadingMessages: false,
        loadingOlder: false,
        cacheKey: 'ferrisoluciones-chat-cache-anon',
        loading: false,
        interval: null
    };

    const els = {
        list: document.getElementById('chatList'),
        search: document.getElementById('chatSearch'),
        reload: document.getElementById('chatReloadBtn'),
        panelReload: document.getElementById('chatPanelReloadBtn'),
        messages: document.getElementById('chatMessages'),
        selectedName: document.getElementById('chatSelectedName'),
        selectedMeta: document.getElementById('chatSelectedMeta'),
        composer: document.getElementById('chatComposer'),
        input: document.getElementById('chatMessageInput'),
        send: document.getElementById('chatSendBtn'),
        quote: document.getElementById('chatQuoteBtn'),
        attach: document.getElementById('chatAttachBtn'),
        imageInput: document.getElementById('chatImageInput'),
        imagePreview: document.getElementById('chatImagePreview'),
        imagePreviewImg: document.getElementById('chatImagePreviewImg'),
        imagePreviewName: document.getElementById('chatImagePreviewName'),
        imagePreviewRemove: document.getElementById('chatImagePreviewRemove'),
        quickReplies: document.getElementById('chatQuickReplies'),
        imageModal: document.getElementById('chatImageModal'),
        imageModalImg: document.getElementById('chatImageModalImg'),
        forwardModal: document.getElementById('chatForwardModal'),
        forwardPreview: document.getElementById('chatForwardPreview'),
        forwardClose: document.getElementById('chatForwardClose'),
        forwardSearch: document.getElementById('chatForwardSearch'),
        forwardList: document.getElementById('chatForwardList'),
        quoteModal: document.getElementById('chatQuoteModal'),
        quoteTitle: document.getElementById('chatQuoteTitle'),
        quotePreview: document.getElementById('chatQuotePreview'),
        quoteClose: document.getElementById('chatQuoteClose'),
        quoteContent: document.getElementById('chatQuoteContent'),
        newPhone: document.getElementById('chatNewPhone'),
        start: document.getElementById('chatStartBtn'),
        liveStatus: document.getElementById('chatLiveStatus'),
        liveText: document.getElementById('chatLiveText')
    };

    function escapeHtml(value) {
        return String(value || '').replace(/[&<>"']/g, function(char) {
            return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char];
        });
    }

    function formatTime(value) {
        if (!value) return '';
        try {
            return new Date(value).toLocaleString('es-EC', {
                day: '2-digit',
                month: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        } catch (_) {
            return '';
        }
    }

    function getScheduleForDate(date) {
        const day = date.getDay();
        if (day === 6) return { open: '8:30', close: '19:00' };
        if (day === 0) return { open: '8:30', close: '18:00' };
        return { open: '8:00', close: '19:30' };
    }

    function getDayName(date) {
        return ['domingo', 'lunes', 'martes', 'miércoles', 'jueves', 'viernes', 'sábado'][date.getDay()];
    }

    function getScheduleReply(offsetDays) {
        const date = new Date();
        date.setDate(date.getDate() + offsetDays);
        const schedule = getScheduleForDate(date);
        const prefix = offsetDays === 0 ? 'Hoy' : offsetDays === 1 ? 'Mañana' : 'Ese día';
        return prefix + ' ' + getDayName(date) + ' atendemos de ' + schedule.open + ' a ' + schedule.close + '.';
    }

    function getQuickReplyText(type) {
        const replies = {
            greeting: 'Hola, gracias por escribir a Ferrisoluciones, tu solución. Cuénteme, ¿en qué podemos ayudarle?',
            today: getScheduleReply(0),
            tomorrow: getScheduleReply(1),
            location: 'Estamos en Luis Cordero N1-32 y José Mejía, Machachi. Como referencia, entre el Hospital y el Mercado Central, al lado de Electrónica Joselito.\nUbicación: https://maps.app.goo.gl/gmuSZSCv86pzJ5iP7',
            stock: 'Con gusto le ayudamos. ¿Busca alguna marca específica o nos puede indicar para qué uso lo necesita? Si tiene una foto o medida, puede enviárnosla para cotizar mejor.',
            quote: 'Claro, envíenos por favor una foto, lista o las medidas de lo que necesita. Así revisamos disponibilidad y le ayudamos con la mejor opción.',
            delivery: 'Por el momento no contamos con entrega a domicilio fija. Podemos ayudarle si es en el centro de Machachi, máximo a 3 cuadras del Mercado Central. También podemos dejarle listo el pedido para retirar o enviarlo por Flash; el envío corre por cuenta del cliente.',
            payments: 'Aceptamos efectivo, transferencia y Deuna por QR.',
            invoice: 'Sí emitimos factura electrónica y también podemos entregar física. Para facturar necesitamos RUC o cédula, nombre, correo, dirección y teléfono.',
            unavailable: 'Por el momento no manejamos zinc, varillas, cemento por quintal, bloques ni pinturas de galón. Cemento por libras sí tenemos, y pintura manejamos solo en spray.',
            closing: 'Quedamos atentos para ayudarle. Gracias por escribir a Ferrisoluciones.'
        };
        return replies[type] || '';
    }

    function insertQuickReply(type) {
        const text = getQuickReplyText(type);
        if (!text) return;

        const current = els.input.value.trim();
        els.input.value = current ? current + '\n\n' + text : text;
        els.input.disabled = false;
        els.send.disabled = false;
        els.input.focus();
        els.input.setSelectionRange(els.input.value.length, els.input.value.length);
    }

    function renderQuickReplies() {
        const items = [
            ['greeting', 'Saludo'],
            ['today', 'Horario hoy'],
            ['tomorrow', 'Horario mañana'],
            ['location', 'Ubicación'],
            ['stock', 'Precio/stock'],
            ['quote', 'Cotización'],
            ['delivery', 'Entrega'],
            ['payments', 'Pagos'],
            ['invoice', 'Factura'],
            ['unavailable', 'No manejamos'],
            ['closing', 'Cierre']
        ];

        els.quickReplies.innerHTML = items.map(function(item) {
            return '<button class="chat-quick-reply" type="button" data-reply="' + escapeHtml(item[0]) + '"' + (!state.selected ? ' disabled' : '') + '>' + escapeHtml(item[1]) + '</button>';
        }).join('');

        els.quickReplies.querySelectorAll('.chat-quick-reply').forEach(function(button) {
            button.addEventListener('click', function() {
                if (!state.selected) return;
                insertQuickReply(button.dataset.reply);
            });
        });
    }

    function initials(name, phone) {
        const text = String(name || phone || 'C').trim();
        const parts = text.split(/\s+/).filter(Boolean);
        if (parts.length > 1) return (parts[0][0] + parts[1][0]).toUpperCase();
        return text.slice(0, 2).toUpperCase();
    }

    function getMessageTimestamp(message) {
        return new Date(message.created_at || 0).getTime() || 0;
    }

    function normalizeWhatsappNumber(value) {
        const digits = String(value || '').replace(/\D/g, '');
        const localNumber = digits.slice(-9);
        return localNumber ? '593' + localNumber : '';
    }

    function formatWhatsappInput() {
        const normalized = normalizeWhatsappNumber(els.newPhone.value);
        if (normalized) {
            els.newPhone.value = normalized;
        }
        return normalized;
    }

    function dedupeMessages(messages) {
        const map = new Map();
        messages.forEach(function(message) {
            const key = message.id || message.provider_message_id || [message.direction, message.created_at, message.body].join('|');
            map.set(key, message);
        });
        return Array.from(map.values()).sort(function(a, b) {
            return getMessageTimestamp(a) - getMessageTimestamp(b);
        });
    }

    function pruneCachePayload(conversations, messagesByConversation) {
        const cachedConversations = conversations
            .slice()
            .sort(function(a, b) {
                return new Date(b.last_message_at || b.updated_at || 0) - new Date(a.last_message_at || a.updated_at || 0);
            })
            .slice(0, CACHE_CONTACT_LIMIT);

        const allowedIds = new Set(cachedConversations.map(function(item) { return item.id; }));
        const cachedMessages = {};
        Object.keys(messagesByConversation || {}).forEach(function(conversationId) {
            if (!allowedIds.has(conversationId)) return;
            cachedMessages[conversationId] = dedupeMessages(messagesByConversation[conversationId] || [])
                .slice(-CACHE_MESSAGE_LIMIT)
                .map(function(message) {
                    const copy = { ...message };
                    delete copy._status;
                    if (String(copy.media_url || '').startsWith('data:')) {
                        copy.media_url = '';
                    }
                    return copy;
                });
        });

        return {
            conversations: cachedConversations,
            messagesByConversation: cachedMessages,
            selectedId: state.selected && state.selected.id,
            savedAt: new Date().toISOString()
        };
    }

    async function setupCacheKey() {
        try {
            const client = getSupabaseClient();
            const result = await client.auth.getSession();
            const userId = result.data && result.data.session && result.data.session.user && result.data.session.user.id;
            if (userId) {
                state.cacheKey = 'ferrisoluciones-chat-cache-' + userId;
            }
        } catch (_) {}
    }

    function saveCache() {
        try {
            const payload = pruneCachePayload(state.conversations, state.messagesByConversation);
            localStorage.setItem(state.cacheKey, JSON.stringify(payload));
        } catch (error) {
            console.warn('No se pudo guardar cache de chat', error);
        }
    }

    function hydrateCache() {
        try {
            const raw = localStorage.getItem(state.cacheKey);
            if (!raw) return;
            const cached = JSON.parse(raw);
            state.conversations = Array.isArray(cached.conversations) ? cached.conversations : [];
            state.messagesByConversation = cached.messagesByConversation || {};
            state.selected = state.conversations.find(function(item) {
                return item.id === cached.selectedId;
            }) || state.conversations[0] || null;
            state.messages = state.selected ? (state.messagesByConversation[state.selected.id] || []) : [];
            renderList();
            if (state.selected) {
                setSelectedHeader(state.selected);
                els.input.disabled = false;
                els.send.disabled = false;
                els.quote.disabled = false;
                els.attach.disabled = false;
                renderQuickReplies();
                renderMessages({ forceBottom: true });
            } else {
                renderQuickReplies();
                renderEmpty('Selecciona una conversacion');
            }
        } catch (error) {
            console.warn('No se pudo leer cache de chat', error);
        }
    }

    function renderEmpty(message) {
        els.messages.innerHTML = '<div class="chat-empty"><div><div class="chat-empty-icon"><i class="fab fa-whatsapp"></i></div><strong>' + escapeHtml(message) + '</strong><div style="margin-top:6px;">Puedes iniciar una conversacion por numero o elegir una existente.</div></div></div>';
    }

    function messageStatusHtml(msg) {
        if (msg._status === 'pending') return '<span class="chat-status-spinner" title="Enviando"></span>';
        if (msg._status === 'failed') return '<span class="chat-status-error" title="No enviado">No enviado</span>';
        if (msg.direction === 'out') return '<span class="chat-status-check" title="Enviado"><i class="fas fa-check"></i></span>';
        return '';
    }

    function canForwardMessage(msg) {
        return Boolean(msg && msg.id && !msg._status && (msg.message_type === 'image' || msg.message_type === 'text' || !msg.message_type) && (msg.body || msg.media_url));
    }

    function forwardButtonHtml(msg) {
        if (!canForwardMessage(msg)) return '';
        return '<button class="chat-forward-btn" type="button" title="Reenviar" data-forward-id="' + escapeHtml(msg.id) + '"><i class="fas fa-share"></i></button>';
    }

    function getForwardPreview(msg) {
        if (!msg) return '';
        if (msg.message_type === 'image') return msg.body ? 'Imagen: ' + msg.body : 'Imagen';
        return msg.body || 'Mensaje';
    }

    function getRawMessageNode(msg, type) {
        const raw = msg.raw || {};
        const message = (raw.data && raw.data.message) || raw.message || {};
        const key = type + 'Message';
        return message[key] || (raw.data && raw.data[key]) || raw[key] || {};
    }

    function getMediaMime(msg) {
        const url = String(msg.media_url || '');
        const dataMatch = url.match(/^data:([^;]+);base64,/i);
        if (dataMatch) return dataMatch[1].toLowerCase();

        const type = msg.message_type || '';
        const node = getRawMessageNode(msg, type);
        return String(node.mimetype || '').split(';')[0].trim().toLowerCase();
    }

    function getDocumentName(msg) {
        const raw = msg.raw || {};
        const node = getRawMessageNode(msg, 'document');
        return String(node.fileName || node.title || raw.fileName || 'documento.pdf').trim();
    }

    function getDocumentLabel(msg) {
        const mime = getMediaMime(msg);
        if (mime === 'application/pdf' || /\.pdf$/i.test(getDocumentName(msg))) return 'PDF';
        return 'Documento';
    }

    function getDocumentIcon(msg) {
        return getDocumentLabel(msg) === 'PDF' ? 'fa-file-pdf' : 'fa-file-lines';
    }

    function renderMessageBody(msg) {
        const body = String(msg.body || '').trim();
        if (!body) return '';
        if (msg.message_type === 'audio') return '';
        if (msg.message_type === 'document') return '<div class="chat-document-caption">' + escapeHtml(body) + '</div>';
        return escapeHtml(body);
    }

    function renderMessageMedia(msg) {
        if (msg.message_type === 'image' && msg.media_url) {
            return '<img class="chat-image" src="' + escapeHtml(msg.media_url) + '" alt="Imagen enviada por WhatsApp" data-image-src="' + escapeHtml(msg.media_url) + '">';
        }

        if (msg.message_type === 'image') {
            return '<div class="chat-image-placeholder"><i class="fas fa-image"></i><span>Imagen</span></div>';
        }

        if (msg.message_type === 'audio') {
            if (msg.media_url) {
                return '<div class="chat-audio-card"><audio controls preload="metadata" src="' + escapeHtml(msg.media_url) + '"></audio></div>';
            }
            return '<div class="chat-media-placeholder"><span class="chat-media-placeholder-icon"><i class="fas fa-microphone"></i></span><span>Mensaje de voz</span></div>';
        }

        if (msg.message_type === 'document') {
            const name = getDocumentName(msg);
            const label = getDocumentLabel(msg);
            const icon = getDocumentIcon(msg);
            if (msg.media_url) {
                return '<a class="chat-document-card" href="' + escapeHtml(msg.media_url) + '" target="_blank" rel="noopener" download="' + escapeHtml(name) + '">' +
                    '<span class="chat-document-icon"><i class="fas ' + icon + '"></i></span>' +
                    '<span><span class="chat-document-title">' + escapeHtml(name) + '</span><span class="chat-document-meta">' + escapeHtml(label) + ' - abrir o descargar</span></span>' +
                    '<span class="chat-document-open"><i class="fas fa-arrow-up-right-from-square"></i></span>' +
                '</a>';
            }
            return '<div class="chat-media-placeholder"><span class="chat-media-placeholder-icon"><i class="fas ' + icon + '"></i></span><span>' + escapeHtml(label) + '</span></div>';
        }

        if (msg.message_type === 'video') {
            return '<div class="chat-media-placeholder"><span class="chat-media-placeholder-icon"><i class="fas fa-video"></i></span><span>Video recibido</span></div>';
        }

        return '';
    }

    function isNearBottom() {
        return els.messages.scrollHeight - els.messages.scrollTop - els.messages.clientHeight < 96;
    }

    function setSelectedHeader(item) {
        const name = item.display_name || item.contact_name || item.phone || 'Cliente';
        const labelClass = item.display_label === 'cliente' ? ' client' : (item.display_label === 'bicliente' ? ' biclient' : '');
        const label = item.display_label ? '<span class="chat-contact-label' + labelClass + '">' + escapeHtml(item.display_label) + '</span>' : '';
        els.selectedName.innerHTML = escapeHtml(name) + label;
        els.selectedMeta.textContent = item.phone || item.remote_jid || '';
    }

    function renderMessages(options) {
        const opts = options || {};
        if (!state.selected) {
            renderEmpty('Selecciona una conversacion');
            return;
        }

        const shouldStickToBottom = opts.forceBottom || isNearBottom();
        const selectedId = state.selected.id;
        const pending = state.pendingMessages.filter(function(msg) {
            return msg.conversation_id === selectedId;
        });
        const messages = state.messages.concat(pending);

        if (!messages.length) {
            const older = state.hasMoreMessages ? '<div class="chat-load-older-wrap"><button id="chatLoadOlderBtn" class="chat-load-older-btn" type="button">Cargar anteriores</button></div>' : '';
            els.messages.innerHTML = older + '<div class="chat-empty"><div><div class="chat-empty-icon"><i class="fab fa-whatsapp"></i></div><strong>Sin mensajes en esta conversacion</strong></div></div>';
            wireLoadOlderButton();
            return;
        }

        const olderButton = state.hasMoreMessages
            ? '<div class="chat-load-older-wrap"><button id="chatLoadOlderBtn" class="chat-load-older-btn" type="button"' + (state.loadingOlder ? ' disabled' : '') + '>' + (state.loadingOlder ? 'Cargando...' : 'Cargar anteriores') + '</button></div>'
            : '';

        els.messages.innerHTML = olderButton + messages.map(function(msg) {
            const direction = msg.direction === 'out' ? 'out' : 'in';
            const statusClass = msg._status ? ' ' + msg._status : '';
            const status = messageStatusHtml(msg);
            return '<div class="chat-message-row ' + direction + statusClass + '"><div class="chat-bubble">' +
                renderMessageMedia(msg) +
                renderMessageBody(msg) +
                '<div class="chat-time">' + forwardButtonHtml(msg) + '<span>' + escapeHtml(formatTime(msg.created_at)) + '</span>' + status + '</div>' +
            '</div></div>';
        }).join('');
        wireLoadOlderButton();
        wireImageOpeners();
        wireForwardButtons();

        if (opts.preserveScroll) {
            const delta = els.messages.scrollHeight - (opts.previousScrollHeight || 0);
            els.messages.scrollTop = delta + (opts.previousScrollTop || 0);
        } else if (shouldStickToBottom) {
            els.messages.scrollTop = els.messages.scrollHeight;
        }
    }

    function wireLoadOlderButton() {
        const button = document.getElementById('chatLoadOlderBtn');
        if (button) button.addEventListener('click', loadOlderMessages);
    }

    function wireImageOpeners() {
        els.messages.querySelectorAll('.chat-image[data-image-src]').forEach(function(img) {
            img.addEventListener('click', function() {
                els.imageModalImg.src = img.dataset.imageSrc;
                els.imageModal.classList.add('active');
            });
        });
    }

    function wireForwardButtons() {
        els.messages.querySelectorAll('.chat-forward-btn[data-forward-id]').forEach(function(button) {
            button.addEventListener('click', function(event) {
                event.preventDefault();
                event.stopPropagation();
                const id = button.dataset.forwardId;
                const msg = state.messages.concat(state.pendingMessages).find(function(item) {
                    return item.id === id;
                });
                if (msg) openForwardModal(msg);
            });
        });
    }

    function forwardIcon(type) {
        if (type === 'provider') return 'fa-truck';
        if (type === 'manual') return 'fa-phone';
        return 'fa-user';
    }

    function renderForwardTargets() {
        if (!state.forwardTargets.length) {
            els.forwardList.innerHTML = '<div class="chat-forward-empty">Busca por nombre, proveedor o numero de WhatsApp.</div>';
            return;
        }

        els.forwardList.innerHTML = state.forwardTargets.map(function(target) {
            return '<button class="chat-forward-target" type="button" data-phone="' + escapeHtml(target.phone) + '" data-type="' + escapeHtml(target.type) + '">' +
                '<span class="chat-forward-type"><i class="fas ' + forwardIcon(target.type) + '"></i></span>' +
                '<span><span class="chat-forward-label">' + escapeHtml(target.label) + '</span><span class="chat-forward-detail">' + escapeHtml(target.detail || target.phone) + '</span></span>' +
                '<span class="chat-forward-send"><i class="fas fa-paper-plane"></i></span>' +
            '</button>';
        }).join('');

        els.forwardList.querySelectorAll('.chat-forward-target').forEach(function(button) {
            button.addEventListener('click', function() {
                forwardCurrentMessage(button.dataset.phone);
            });
        });
    }

    async function loadForwardTargets() {
        const search = els.forwardSearch.value.trim();
        const params = new URLSearchParams();
        if (search) params.set('search', search);
        els.forwardList.innerHTML = '<div class="chat-forward-empty">Buscando destinos...</div>';
        try {
            const result = await posApiRequest('/api/chat/forward-targets?' + params.toString(), { method: 'GET' });
            state.forwardTargets = result.data || [];
            renderForwardTargets();
        } catch (error) {
            els.forwardList.innerHTML = '<div class="chat-forward-empty">No se pudo buscar destinos: ' + escapeHtml(error.message) + '</div>';
        }
    }

    function openForwardModal(msg) {
        state.forwardingMessage = msg;
        state.forwardTargets = [];
        els.forwardPreview.textContent = getForwardPreview(msg);
        els.forwardSearch.value = '';
        els.forwardModal.classList.add('active');
        renderForwardTargets();

    async function fillQuoteClientNameFromIdentity() {
        const input = document.getElementById('quoteClientId');
        const nameInput = document.getElementById('quoteClientName');
        if (!input || !nameInput) return;

        const id = input.value.replace(/\D/g, '');
        if (!id) return;
        if (id.length !== 10 && id.length !== 13) {
            showCustomAlert('Completa correctamente la cedula o RUC antes de continuar.', 'warning', 'Cliente');
            return;

        const original = nameInput.value;
        nameInput.value = 'Consultando datos...';
        try {
            const path = id.length === 13 ? '/api/identity/ruc/' : '/api/identity/cedula/';
            const result = await posApiRequest(path + encodeURIComponent(id), { method: 'GET' });
            const data = result.data || {};
            const nombre = data?.data?.response?.nombreCompleto ||
                data?.response?.nombreCompleto ||
                data?.data?.main?.[0]?.razonSocial ||
                data?.main?.[0]?.razonSocial ||
                data?.resultado?.nombre ||
                data?.resultado?.contribuyente?.[0]?.razonSocial ||
                '';

            if (nombre) {
                nameInput.value = nombre;
            } else {
                nameInput.value = original;
                showCustomAlert('No se pudo obtener el nombre automaticamente.', 'warning', 'Cliente');
            }
        } catch (error) {
            nameInput.value = original;
            showCustomAlert('No se pudo consultar la identificacion: ' + error.message, 'warning', 'Cliente');
        }
    }

    function canvasToBlob(canvas, type, quality) {
        return new Promise(function(resolve) {
            canvas.toBlob(function(blob) {
                resolve(blob);
            }, type, quality);
        });
    }

    function blobToDataUrl(blob) {
        return new Promise(function(resolve, reject) {
            const reader = new FileReader();
            reader.onload = function() { resolve(reader.result); };
            reader.onerror = function() { reject(reader.error || new Error('No se pudo leer la imagen')); };
            reader.readAsDataURL(blob);
        });
    }

    function loadImageFromFile(file) {
        return new Promise(function(resolve, reject) {
            const url = URL.createObjectURL(file);
            const image = new Image();
            image.onload = function() {
                URL.revokeObjectURL(url);
                resolve(image);
            };
            image.onerror = function() {
                URL.revokeObjectURL(url);
                reject(new Error('No se pudo procesar la imagen'));
            };
            image.src = url;
        });
    }

    async function compressImageForWhatsApp(file) {
        const image = await loadImageFromFile(file);
        const maxSide = 1600;
        const scale = Math.min(1, maxSide / Math.max(image.naturalWidth || image.width, image.naturalHeight || image.height));
        const width = Math.max(1, Math.round((image.naturalWidth || image.width) * scale));
        const height = Math.max(1, Math.round((image.naturalHeight || image.height) * scale));
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;

        const context = canvas.getContext('2d', { alpha: false });
        context.fillStyle = '#ffffff';
        context.fillRect(0, 0, width, height);
        context.drawImage(image, 0, 0, width, height);

        let blob = await canvasToBlob(canvas, 'image/webp', 0.8);
        let mimetype = 'image/webp';

        if (!blob || blob.type !== 'image/webp') {
            blob = await canvasToBlob(canvas, 'image/jpeg', 0.82);
            mimetype = 'image/jpeg';
        }

        if (!blob) {
            throw new Error('No se pudo comprimir la imagen');
        }

        return {
            dataUrl: await blobToDataUrl(blob),
            mimetype: mimetype,
            fileName: (file.name || 'imagen').replace(/\.[^.]+$/, '') + (mimetype === 'image/webp' ? '.webp' : '.jpg'),
            originalSize: file.size,
            compressedSize: blob.size
        };
    }

    function formatFileSize(bytes) {
        if (!bytes) return '0 KB';
        if (bytes >= 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
        return Math.max(1, Math.round(bytes / 1024)) + ' KB';
    }

    function validateCompressedImage(image) {
        if (image.dataUrl.length > 10 * 1024 * 1024) {
            throw new Error('La imagen sigue siendo muy pesada despues de comprimirla.');
        }
        return image;
    }

    function fileToDataUrl(file) {
        return compressImageForWhatsApp(file).then(validateCompressedImage);
    }

    async function loadMessages(options) {
        const opts = options || {};
        if (!state.selected) {
            renderEmpty('Selecciona una conversacion');
            return;
        }

        state.loadingMessages = true;
        const wasNearBottom = isNearBottom();
        const params = new URLSearchParams();
        params.set('limit', String(PAGE_SIZE));
        if (opts.before) params.set('before', opts.before);

        const previousScrollHeight = els.messages.scrollHeight;
        const previousScrollTop = els.messages.scrollTop;
        const result = await posApiRequest('/api/chat/conversations/' + encodeURIComponent(state.selected.id) + '/messages?' + params.toString(), { method: 'GET' });
        const rows = result.data || [];

        if (opts.appendOlder) {
            state.messages = dedupeMessages(rows.concat(state.messages));
        } else {
            state.messages = dedupeMessages(rows);
        }

        state.hasMoreMessages = Boolean(result.hasMore);
        state.messagesByConversation[state.selected.id] = state.messages.slice(-CACHE_MESSAGE_LIMIT);
        state.loadingMessages = false;
        saveCache();

        renderMessages({
            forceBottom: Boolean(opts.forceBottom || (!opts.appendOlder && wasNearBottom)),
            preserveScroll: Boolean(opts.appendOlder),
            previousScrollHeight: previousScrollHeight,
            previousScrollTop: previousScrollTop
        });
    }

    async function loadOlderMessages() {
        if (!state.selected || state.loadingOlder || !state.messages.length) return;

        state.loadingOlder = true;
        renderMessages({ preserveScroll: true, previousScrollHeight: els.messages.scrollHeight, previousScrollTop: els.messages.scrollTop });
        try {
            await loadMessages({
                before: state.messages[0].created_at,
                appendOlder: true
            });
        } catch (error) {
            showCustomAlert('No se pudieron cargar mensajes anteriores: ' + error.message, 'error', 'WhatsApp');
        } finally {
            state.loadingOlder = false;
            renderMessages({ preserveScroll: true, previousScrollHeight: els.messages.scrollHeight, previousScrollTop: els.messages.scrollTop });
        }
    }

    async function sendMessage(event) {
        event.preventDefault();
        if (!state.selected) return;

        const text = els.input.value.trim();
        if (!text && !state.pendingImage) return;

        if (state.pendingImage) {
            await sendImageMessage(text);
            return;
        }

        const tempId = 'pending-' + Date.now() + '-' + Math.random().toString(16).slice(2);
        const optimisticMessage = {
            id: tempId,
            conversation_id: state.selected.id,
            direction: 'out',
            body: text,
            created_at: new Date().toISOString(),
            _status: 'pending'
        };

        state.pendingMessages.push(optimisticMessage);
        els.input.value = '';
        renderMessages();
        els.send.disabled = true;
        try {
            await posApiRequest('/api/chat/conversations/' + encodeURIComponent(state.selected.id) + '/send-text', {
                method: 'POST',
                body: JSON.stringify({ text: text })
            });
            optimisticMessage._status = 'sent';
            state.pendingMessages = state.pendingMessages.filter(function(msg) {
                return msg.id !== tempId;
            });
            await loadConversations(true);
        await loadMessages({ forceBottom: true });
        } catch (error) {
            optimisticMessage._status = 'failed';
            renderMessages();
            showCustomAlert('No se pudo enviar el mensaje: ' + error.message, 'error', 'WhatsApp');
        } finally {
            els.send.disabled = false;
            els.input.focus();
        }
    }

    async function connectLiveStream() {
        if (window.__posChatStreamAbort) {
            window.__posChatStreamAbort.abort();
        }

        const client = getSupabaseClient();
        const sessionResult = await client.auth.getSession();
        const token = sessionResult.data && sessionResult.data.session && sessionResult.data.session.access_token;
        if (!token) {
            setLiveStatus('error', 'Sin sesion en vivo');
            return;
        }

        const abortController = new AbortController();
        window.__posChatStreamAbort = abortController;
        setLiveStatus('', 'Conectando en vivo');

        try {
            const response = await fetch(POS_API_BASE_URL + '/api/chat/stream', {
                method: 'GET',
                headers: { Authorization: 'Bearer ' + token },
                signal: abortController.signal
            });

            if (!response.ok || !response.body) {
                throw new Error('Stream no disponible');
            }

            setLiveStatus('connected', 'En vivo');
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (!abortController.signal.aborted) {
                const result = await reader.read();
                if (result.done) break;
                buffer += decoder.decode(result.value, { stream: true });

                let separatorIndex = buffer.indexOf('\n\n');
                while (separatorIndex >= 0) {
                    const rawEvent = buffer.slice(0, separatorIndex);
                    buffer = buffer.slice(separatorIndex + 2);
                    handleStreamChunk(rawEvent);
                    separatorIndex = buffer.indexOf('\n\n');
                }
            }
        } catch (error) {
            if (!abortController.signal.aborted) {
                setLiveStatus('error', 'Reconectando');
                setTimeout(connectLiveStream, 4000);
            }
        }
    }

    function handleStreamChunk(rawEvent) {
        if (!rawEvent || rawEvent.charAt(0) === ':') return;

        const eventNameLine = rawEvent.split('\n').find(function(line) { return line.indexOf('event: ') === 0; });
        const eventName = eventNameLine ? eventNameLine.replace('event: ', '').trim() : 'message';

        if (eventName === 'ping') {
            setLiveStatus('connected', 'En vivo');
            return;
        }

        if (eventName === 'message' || eventName === 'conversation') {
            refreshAll();
        }
    }

    }, 350));
    els.reload.addEventListener('click', refreshAll);
    els.panelReload.addEventListener('click', refreshAll);
    els.composer.addEventListener('submit', sendMessage);
    els.start.addEventListener('click', startConversation);
    els.newPhone.addEventListener('blur', formatWhatsappInput);
    els.newPhone.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
            event.preventDefault();
            startConversation();
        }
    });
    els.attach.addEventListener('click', function() {
        if (!state.selected) return;
        els.imageInput.click();
    });
    els.quote.addEventListener('click', startQuoteFromChat);
    els.imageInput.addEventListener('change', async function() {
        const file = els.imageInput.files && els.imageInput.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) {
            showCustomAlert('Selecciona una imagen valida.', 'warning', 'Imagen');
            clearPendingImage();
            return;
        }
        if (file.size > 12 * 1024 * 1024) {
            showCustomAlert('La imagen es muy pesada. Usa una imagen menor a 12 MB.', 'warning', 'Imagen');
            clearPendingImage();
            return;
        }
        try {
            const image = await fileToDataUrl(file);
            state.pendingImage = {
                dataUrl: image.dataUrl,
                mimetype: image.mimetype,
                fileName: image.fileName
            };
            els.imagePreviewImg.src = image.dataUrl;
            els.imagePreviewName.textContent = (file.name || 'Imagen seleccionada') + ' · ' + formatFileSize(image.compressedSize);
            els.imagePreview.classList.add('active');
            els.input.focus();
        } catch (error) {
            showCustomAlert('No se pudo cargar la imagen: ' + error.message, 'error', 'Imagen');
            clearPendingImage();
        }
    });
    els.imagePreviewRemove.addEventListener('click', clearPendingImage);
    els.imageModal.addEventListener('click', function(event) {
        if (event.target === els.imageModal || event.target === els.imageModalImg) {
            els.imageModal.classList.remove('active');
            els.imageModalImg.removeAttribute('src');
        }
    });
    els.forwardClose.addEventListener('click', closeForwardModal);
    els.forwardModal.addEventListener('click', function(event) {
        if (event.target === els.forwardModal) closeForwardModal();
    });
    els.forwardSearch.addEventListener('input', function() {
        clearTimeout(state.forwardSearchTimer);
        state.forwardSearchTimer = setTimeout(loadForwardTargets, 280);
    });
    els.forwardSearch.addEventListener('keydown', function(event) {
        if (event.key === 'Escape') closeForwardModal();
    });
    els.quoteClose.addEventListener('click', closeQuoteModal);
    els.quoteModal.addEventListener('click', function(event) {
        if (event.target === els.quoteModal) closeQuoteModal();
    });
    els.input.addEventListener('keydown', function(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            els.composer.requestSubmit();
        }
    });

    renderEmpty('Selecciona una conversacion');
    renderQuickReplies();
    (async function bootstrapChat() {
        await setupCacheKey();
        hydrateCache();
        await refreshAll();
        connectLiveStream();
    })();
    clearInterval(window.__posChatRefreshInterval);
    window.__posChatRefreshInterval = setInterval(refreshAll, 60000);
}
</script>
