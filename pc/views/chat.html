<script>
function initChat() {
    const CACHE_CONTACT_LIMIT = 6;
    const CACHE_MESSAGE_LIMIT = 25;
    const PAGE_SIZE = 25;

    const state = {
        conversations: [],
        selected: null,
        messages: [],
        messagesByConversation: {},
        pendingMessages: [],
        pendingImage: null,
        hasMoreMessages: false,
        loadingMessages: false,
        loadingOlder: false,
        cacheKey: 'ferrisoluciones-chat-cache-anon',
        loading: false,
        interval: null
    };

    const els = {
        list: document.getElementById('chatList'),
        search: document.getElementById('chatSearch'),
        reload: document.getElementById('chatReloadBtn'),
        panelReload: document.getElementById('chatPanelReloadBtn'),
        messages: document.getElementById('chatMessages'),
        selectedName: document.getElementById('chatSelectedName'),
        selectedMeta: document.getElementById('chatSelectedMeta'),
        composer: document.getElementById('chatComposer'),
        input: document.getElementById('chatMessageInput'),
        send: document.getElementById('chatSendBtn'),
        attach: document.getElementById('chatAttachBtn'),
        imageInput: document.getElementById('chatImageInput'),
        imagePreview: document.getElementById('chatImagePreview'),
        imagePreviewImg: document.getElementById('chatImagePreviewImg'),
        imagePreviewName: document.getElementById('chatImagePreviewName'),
        imagePreviewRemove: document.getElementById('chatImagePreviewRemove'),
        imageModal: document.getElementById('chatImageModal'),
        imageModalImg: document.getElementById('chatImageModalImg'),
        newPhone: document.getElementById('chatNewPhone'),
        start: document.getElementById('chatStartBtn'),
        liveStatus: document.getElementById('chatLiveStatus'),
        liveText: document.getElementById('chatLiveText')
    };

    function escapeHtml(value) {
        return String(value || '').replace(/[&<>"']/g, function(char) {
            return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char];
        });
    }

    function formatTime(value) {
        if (!value) return '';
        try {
            return new Date(value).toLocaleString('es-EC', {
                day: '2-digit',
                month: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        } catch (_) {
            return '';
        }
    }

    function initials(name, phone) {
        const text = String(name || phone || 'C').trim();
        const parts = text.split(/\s+/).filter(Boolean);
        if (parts.length > 1) return (parts[0][0] + parts[1][0]).toUpperCase();
        return text.slice(0, 2).toUpperCase();
    }

    function getMessageTimestamp(message) {
        return new Date(message.created_at || 0).getTime() || 0;
    }

    function dedupeMessages(messages) {
        const map = new Map();
        messages.forEach(function(message) {
            const key = message.id || message.provider_message_id || [message.direction, message.created_at, message.body].join('|');
            map.set(key, message);
        });
        return Array.from(map.values()).sort(function(a, b) {
            return getMessageTimestamp(a) - getMessageTimestamp(b);
        });
    }

    function pruneCachePayload(conversations, messagesByConversation) {
        const cachedConversations = conversations
            .slice()
            .sort(function(a, b) {
                return new Date(b.last_message_at || b.updated_at || 0) - new Date(a.last_message_at || a.updated_at || 0);
            })
            .slice(0, CACHE_CONTACT_LIMIT);

        const allowedIds = new Set(cachedConversations.map(function(item) { return item.id; }));
        const cachedMessages = {};
        Object.keys(messagesByConversation || {}).forEach(function(conversationId) {
            if (!allowedIds.has(conversationId)) return;
            cachedMessages[conversationId] = dedupeMessages(messagesByConversation[conversationId] || [])
                .slice(-CACHE_MESSAGE_LIMIT)
                .map(function(message) {
                    const copy = { ...message };
                    delete copy._status;
                    if (String(copy.media_url || '').startsWith('data:')) {
                        copy.media_url = '';
                    }
                    return copy;
                });
        });

        return {
            conversations: cachedConversations,
            messagesByConversation: cachedMessages,
            selectedId: state.selected && state.selected.id,
            savedAt: new Date().toISOString()
        };
    }

    async function setupCacheKey() {
        try {
            const client = getSupabaseClient();
            const result = await client.auth.getSession();
            const userId = result.data && result.data.session && result.data.session.user && result.data.session.user.id;
            if (userId) {
                state.cacheKey = 'ferrisoluciones-chat-cache-' + userId;
            }
        } catch (_) {}
    }

    function saveCache() {
        try {
            const payload = pruneCachePayload(state.conversations, state.messagesByConversation);
            localStorage.setItem(state.cacheKey, JSON.stringify(payload));
        } catch (error) {
            console.warn('No se pudo guardar cache de chat', error);
        }
    }

    function hydrateCache() {
        try {
            const raw = localStorage.getItem(state.cacheKey);
            if (!raw) return;
            const cached = JSON.parse(raw);
            state.conversations = Array.isArray(cached.conversations) ? cached.conversations : [];
            state.messagesByConversation = cached.messagesByConversation || {};
            state.selected = state.conversations.find(function(item) {
                return item.id === cached.selectedId;
            }) || state.conversations[0] || null;
            state.messages = state.selected ? (state.messagesByConversation[state.selected.id] || []) : [];
            renderList();
            if (state.selected) {
                setSelectedHeader(state.selected);
                els.input.disabled = false;
                els.send.disabled = false;
                els.attach.disabled = false;
                renderMessages({ forceBottom: true });
            } else {
                renderEmpty('Selecciona una conversacion');
            }
        } catch (error) {
            console.warn('No se pudo leer cache de chat', error);
        }
    }

    function renderEmpty(message) {
        els.messages.innerHTML = '<div class="chat-empty"><div><div class="chat-empty-icon"><i class="fab fa-whatsapp"></i></div><strong>' + escapeHtml(message) + '</strong><div style="margin-top:6px;">Puedes iniciar una conversacion por numero o elegir una existente.</div></div></div>';
    }

    function messageStatusHtml(msg) {
        if (msg._status === 'pending') return '<span class="chat-status-spinner" title="Enviando"></span>';
        if (msg._status === 'failed') return '<span class="chat-status-error" title="No enviado">No enviado</span>';
        if (msg.direction === 'out') return '<span class="chat-status-check" title="Enviado"><i class="fas fa-check"></i></span>';
        return '';
    }

    function renderMessageMedia(msg) {
        if (msg.message_type !== 'image') return '';
        if (msg.media_url) {
            return '<img class="chat-image" src="' + escapeHtml(msg.media_url) + '" alt="Imagen enviada por WhatsApp" data-image-src="' + escapeHtml(msg.media_url) + '">';
        }
        return '<div class="chat-image-placeholder"><i class="fas fa-image"></i><span>Imagen</span></div>';
    }

    function isNearBottom() {
        return els.messages.scrollHeight - els.messages.scrollTop - els.messages.clientHeight < 96;
    }

    function setSelectedHeader(item) {
        els.selectedName.textContent = item.contact_name || item.phone || 'Cliente';
        els.selectedMeta.textContent = item.phone || item.remote_jid || '';
    }

    function renderMessages(options) {
        const opts = options || {};
        if (!state.selected) {
            renderEmpty('Selecciona una conversacion');
            return;
        }

        const shouldStickToBottom = opts.forceBottom || isNearBottom();
        const selectedId = state.selected.id;
        const pending = state.pendingMessages.filter(function(msg) {
            return msg.conversation_id === selectedId;
        });
        const messages = state.messages.concat(pending);

        if (!messages.length) {
            const older = state.hasMoreMessages ? '<div class="chat-load-older-wrap"><button id="chatLoadOlderBtn" class="chat-load-older-btn" type="button">Cargar anteriores</button></div>' : '';
            els.messages.innerHTML = older + '<div class="chat-empty"><div><div class="chat-empty-icon"><i class="fab fa-whatsapp"></i></div><strong>Sin mensajes en esta conversacion</strong></div></div>';
            wireLoadOlderButton();
            return;
        }

        const olderButton = state.hasMoreMessages
            ? '<div class="chat-load-older-wrap"><button id="chatLoadOlderBtn" class="chat-load-older-btn" type="button"' + (state.loadingOlder ? ' disabled' : '') + '>' + (state.loadingOlder ? 'Cargando...' : 'Cargar anteriores') + '</button></div>'
            : '';

        els.messages.innerHTML = olderButton + messages.map(function(msg) {
            const direction = msg.direction === 'out' ? 'out' : 'in';
            const statusClass = msg._status ? ' ' + msg._status : '';
            const status = messageStatusHtml(msg);
            return '<div class="chat-message-row ' + direction + statusClass + '"><div class="chat-bubble">' +
                renderMessageMedia(msg) +
                escapeHtml(msg.body || '') +
                '<div class="chat-time"><span>' + escapeHtml(formatTime(msg.created_at)) + '</span>' + status + '</div>' +
            '</div></div>';
        }).join('');
        wireLoadOlderButton();
        wireImageOpeners();

        if (opts.preserveScroll) {
            const delta = els.messages.scrollHeight - (opts.previousScrollHeight || 0);
            els.messages.scrollTop = delta + (opts.previousScrollTop || 0);
        } else if (shouldStickToBottom) {
            els.messages.scrollTop = els.messages.scrollHeight;
        }
    }

    function wireLoadOlderButton() {
        const button = document.getElementById('chatLoadOlderBtn');
        if (button) button.addEventListener('click', loadOlderMessages);
    }

    function wireImageOpeners() {
        els.messages.querySelectorAll('.chat-image[data-image-src]').forEach(function(img) {
            img.addEventListener('click', function() {
                els.imageModalImg.src = img.dataset.imageSrc;
                els.imageModal.classList.add('active');
            });
        });
    }

    function clearPendingImage() {
        state.pendingImage = null;
        els.imageInput.value = '';
        els.imagePreview.classList.remove('active');
        els.imagePreviewImg.removeAttribute('src');
        els.imagePreviewName.textContent = '';
    }

    function fileToDataUrl(file) {
        return new Promise(function(resolve, reject) {
            const reader = new FileReader();
            reader.onload = function() { resolve(reader.result); };
            reader.onerror = function() { reject(reader.error || new Error('No se pudo leer la imagen')); };
            reader.readAsDataURL(file);
        });
    }

    function renderList() {
        if (!state.conversations.length) {
            els.list.innerHTML = '<div class="chat-empty" style="height:auto; padding:28px 14px;"><div><strong>Sin conversaciones todavia</strong><div style="margin-top:6px;">Cuando llegue un mensaje por Evolution aparecera aqui.</div></div></div>';
            return;
        }

        els.list.innerHTML = state.conversations.map(function(item) {
            const active = state.selected && state.selected.id === item.id ? ' active' : '';
            const name = item.contact_name || item.phone || 'Cliente';
            const preview = item.last_message || item.phone || '';
            const badge = Number(item.unread_count || 0) > 0 ? '<span class="chat-badge">' + Number(item.unread_count || 0) + '</span>' : '';
            return '<button class="chat-item' + active + '" type="button" data-id="' + escapeHtml(item.id) + '">' +
                '<div class="chat-avatar">' + escapeHtml(initials(name, item.phone)) + '</div>' +
                '<div><div class="chat-contact">' + escapeHtml(name) + '</div><div class="chat-preview">' + escapeHtml(preview) + '</div></div>' +
                '<div>' + badge + '</div>' +
            '</button>';
        }).join('');

        els.list.querySelectorAll('.chat-item').forEach(function(btn) {
            btn.addEventListener('click', function() {
                const item = state.conversations.find(function(row) { return row.id === btn.dataset.id; });
                if (item) selectConversation(item);
            });
        });
    }

    async function loadConversations(keepSelection) {
        const params = new URLSearchParams();
        const search = els.search.value.trim();
        if (search) params.set('search', search);
        const result = await posApiRequest('/api/chat/conversations?' + params.toString(), { method: 'GET' });
        state.conversations = result.data || [];

        if (keepSelection && state.selected) {
            const fresh = state.conversations.find(function(item) { return item.id === state.selected.id; });
            if (fresh) state.selected = fresh;
        }

        renderList();
        saveCache();
    }

    async function selectConversation(item) {
        state.selected = item;
        setSelectedHeader(item);
        els.input.disabled = false;
        els.send.disabled = false;
        els.attach.disabled = false;
        state.messages = state.messagesByConversation[item.id] || [];
        state.hasMoreMessages = false;
        renderList();
        renderMessages({ forceBottom: true });
        saveCache();
        await loadMessages({ forceBottom: true });
    }

    async function loadMessages(options) {
        const opts = options || {};
        if (!state.selected) {
            renderEmpty('Selecciona una conversacion');
            return;
        }

        state.loadingMessages = true;
        const wasNearBottom = isNearBottom();
        const params = new URLSearchParams();
        params.set('limit', String(PAGE_SIZE));
        if (opts.before) params.set('before', opts.before);

        const previousScrollHeight = els.messages.scrollHeight;
        const previousScrollTop = els.messages.scrollTop;
        const result = await posApiRequest('/api/chat/conversations/' + encodeURIComponent(state.selected.id) + '/messages?' + params.toString(), { method: 'GET' });
        const rows = result.data || [];

        if (opts.appendOlder) {
            state.messages = dedupeMessages(rows.concat(state.messages));
        } else {
            state.messages = dedupeMessages(rows);
        }

        state.hasMoreMessages = Boolean(result.hasMore);
        state.messagesByConversation[state.selected.id] = state.messages.slice(-CACHE_MESSAGE_LIMIT);
        state.loadingMessages = false;
        saveCache();

        renderMessages({
            forceBottom: Boolean(opts.forceBottom || (!opts.appendOlder && wasNearBottom)),
            preserveScroll: Boolean(opts.appendOlder),
            previousScrollHeight: previousScrollHeight,
            previousScrollTop: previousScrollTop
        });
    }

    async function loadOlderMessages() {
        if (!state.selected || state.loadingOlder || !state.messages.length) return;

        state.loadingOlder = true;
        renderMessages({ preserveScroll: true, previousScrollHeight: els.messages.scrollHeight, previousScrollTop: els.messages.scrollTop });
        try {
            await loadMessages({
                before: state.messages[0].created_at,
                appendOlder: true
            });
        } catch (error) {
            showCustomAlert('No se pudieron cargar mensajes anteriores: ' + error.message, 'error', 'WhatsApp');
        } finally {
            state.loadingOlder = false;
            renderMessages({ preserveScroll: true, previousScrollHeight: els.messages.scrollHeight, previousScrollTop: els.messages.scrollTop });
        }
    }

    async function sendMessage(event) {
        event.preventDefault();
        if (!state.selected) return;

        const text = els.input.value.trim();
        if (!text && !state.pendingImage) return;

        if (state.pendingImage) {
            await sendImageMessage(text);
            return;
        }

        const tempId = 'pending-' + Date.now() + '-' + Math.random().toString(16).slice(2);
        const optimisticMessage = {
            id: tempId,
            conversation_id: state.selected.id,
            direction: 'out',
            body: text,
            created_at: new Date().toISOString(),
            _status: 'pending'
        };

        state.pendingMessages.push(optimisticMessage);
        els.input.value = '';
        renderMessages();
        els.send.disabled = true;
        try {
            await posApiRequest('/api/chat/conversations/' + encodeURIComponent(state.selected.id) + '/send-text', {
                method: 'POST',
                body: JSON.stringify({ text: text })
            });
            optimisticMessage._status = 'sent';
            state.pendingMessages = state.pendingMessages.filter(function(msg) {
                return msg.id !== tempId;
            });
            await loadConversations(true);
        await loadMessages({ forceBottom: true });
        } catch (error) {
            optimisticMessage._status = 'failed';
            renderMessages();
            showCustomAlert('No se pudo enviar el mensaje: ' + error.message, 'error', 'WhatsApp');
        } finally {
            els.send.disabled = false;
            els.input.focus();
        }
    }

    async function sendImageMessage(caption) {
        if (!state.selected || !state.pendingImage) return;

        const image = state.pendingImage;
        const tempId = 'pending-image-' + Date.now() + '-' + Math.random().toString(16).slice(2);
        const optimisticMessage = {
            id: tempId,
            conversation_id: state.selected.id,
            direction: 'out',
            message_type: 'image',
            body: caption || '',
            media_url: image.dataUrl,
            created_at: new Date().toISOString(),
            _status: 'pending'
        };

        state.pendingMessages.push(optimisticMessage);
        els.input.value = '';
        clearPendingImage();
        renderMessages();
        els.send.disabled = true;
        els.attach.disabled = true;

        try {
            await posApiRequest('/api/chat/conversations/' + encodeURIComponent(state.selected.id) + '/send-media', {
                method: 'POST',
                body: JSON.stringify({
                    dataUrl: image.dataUrl,
                    mimetype: image.mimetype,
                    fileName: image.fileName,
                    caption: caption || ''
                })
            });
            state.pendingMessages = state.pendingMessages.filter(function(msg) {
                return msg.id !== tempId;
            });
            await loadConversations(true);
            await loadMessages({ forceBottom: true });
        } catch (error) {
            optimisticMessage._status = 'failed';
            renderMessages();
            showCustomAlert('No se pudo enviar la imagen: ' + error.message, 'error', 'WhatsApp');
        } finally {
            els.send.disabled = false;
            els.attach.disabled = false;
            els.input.focus();
        }
    }

    async function startConversation() {
        const phone = els.newPhone.value.trim();
        if (!phone) {
            showCustomAlert('Ingresa un numero de WhatsApp.', 'warning', 'Nuevo chat');
            return;
        }

        els.start.disabled = true;
        try {
            const result = await posApiRequest('/api/chat/conversations', {
                method: 'POST',
                body: JSON.stringify({ phone: phone })
            });
            els.newPhone.value = '';
            await loadConversations();
            await selectConversation(result.data);
        } catch (error) {
            showCustomAlert('No se pudo abrir el chat: ' + error.message, 'error', 'Nuevo chat');
        } finally {
            els.start.disabled = false;
        }
    }

    async function refreshAll() {
        if (state.loading) return;
        state.loading = true;
        try {
            await loadConversations(true);
            if (state.selected) await loadMessages();
            if (!state.selected) renderEmpty('Selecciona una conversacion');
        } catch (error) {
            els.list.innerHTML = '<div class="chat-empty" style="height:auto; padding:28px 14px;"><div><strong>No se pudo cargar chat</strong><div style="margin-top:6px;">' + escapeHtml(error.message) + '</div></div></div>';
            renderEmpty('Revisa que las tablas de chat existan en Supabase');
        } finally {
            state.loading = false;
        }
    }

    function setLiveStatus(status, text) {
        els.liveStatus.classList.remove('connected', 'error');
        if (status) els.liveStatus.classList.add(status);
        els.liveText.textContent = text;
    }

    async function connectLiveStream() {
        if (window.__posChatStreamAbort) {
            window.__posChatStreamAbort.abort();
        }

        const client = getSupabaseClient();
        const sessionResult = await client.auth.getSession();
        const token = sessionResult.data && sessionResult.data.session && sessionResult.data.session.access_token;
        if (!token) {
            setLiveStatus('error', 'Sin sesion en vivo');
            return;
        }

        const abortController = new AbortController();
        window.__posChatStreamAbort = abortController;
        setLiveStatus('', 'Conectando en vivo');

        try {
            const response = await fetch(POS_API_BASE_URL + '/api/chat/stream', {
                method: 'GET',
                headers: { Authorization: 'Bearer ' + token },
                signal: abortController.signal
            });

            if (!response.ok || !response.body) {
                throw new Error('Stream no disponible');
            }

            setLiveStatus('connected', 'En vivo');
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (!abortController.signal.aborted) {
                const result = await reader.read();
                if (result.done) break;
                buffer += decoder.decode(result.value, { stream: true });

                let separatorIndex = buffer.indexOf('\n\n');
                while (separatorIndex >= 0) {
                    const rawEvent = buffer.slice(0, separatorIndex);
                    buffer = buffer.slice(separatorIndex + 2);
                    handleStreamChunk(rawEvent);
                    separatorIndex = buffer.indexOf('\n\n');
                }
            }
        } catch (error) {
            if (!abortController.signal.aborted) {
                setLiveStatus('error', 'Reconectando');
                setTimeout(connectLiveStream, 4000);
            }
        }
    }

    function handleStreamChunk(rawEvent) {
        if (!rawEvent || rawEvent.charAt(0) === ':') return;

        const eventNameLine = rawEvent.split('\n').find(function(line) { return line.indexOf('event: ') === 0; });
        const eventName = eventNameLine ? eventNameLine.replace('event: ', '').trim() : 'message';

        if (eventName === 'ping') {
            setLiveStatus('connected', 'En vivo');
            return;
        }

        if (eventName === 'message' || eventName === 'conversation') {
            refreshAll();
        }
    }

    els.search.addEventListener('input', app.debounce(function() {
        loadConversations(true).catch(function(error) {
            console.error('Error buscando conversaciones', error);
        });
    }, 350));
    els.reload.addEventListener('click', refreshAll);
    els.panelReload.addEventListener('click', refreshAll);
    els.composer.addEventListener('submit', sendMessage);
    els.start.addEventListener('click', startConversation);
    els.attach.addEventListener('click', function() {
        if (!state.selected) return;
        els.imageInput.click();
    });
    els.imageInput.addEventListener('change', async function() {
        const file = els.imageInput.files && els.imageInput.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) {
            showCustomAlert('Selecciona una imagen valida.', 'warning', 'Imagen');
            clearPendingImage();
            return;
        }
        if (file.size > 7 * 1024 * 1024) {
            showCustomAlert('La imagen es muy pesada. Usa una imagen menor a 7 MB.', 'warning', 'Imagen');
            clearPendingImage();
            return;
        }
        try {
            const dataUrl = await fileToDataUrl(file);
            state.pendingImage = {
                dataUrl: dataUrl,
                mimetype: file.type || 'image/jpeg',
                fileName: file.name || 'imagen.jpg'
            };
            els.imagePreviewImg.src = dataUrl;
            els.imagePreviewName.textContent = file.name || 'Imagen seleccionada';
            els.imagePreview.classList.add('active');
            els.input.focus();
        } catch (error) {
            showCustomAlert('No se pudo cargar la imagen: ' + error.message, 'error', 'Imagen');
            clearPendingImage();
        }
    });
    els.imagePreviewRemove.addEventListener('click', clearPendingImage);
    els.imageModal.addEventListener('click', function(event) {
        if (event.target === els.imageModal || event.target === els.imageModalImg) {
            els.imageModal.classList.remove('active');
            els.imageModalImg.removeAttribute('src');
        }
    });
    els.input.addEventListener('keydown', function(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            els.composer.requestSubmit();
        }
    });

    renderEmpty('Selecciona una conversacion');
    (async function bootstrapChat() {
        await setupCacheKey();
        hydrateCache();
        await refreshAll();
        connectLiveStream();
    })();
    clearInterval(window.__posChatRefreshInterval);
    window.__posChatRefreshInterval = setInterval(refreshAll, 60000);
}
</script>
