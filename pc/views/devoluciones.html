<!-- ═══ SCRIPT ════════════════════════════════════════════════════════════════════ -->
<script>
// ─── Estado ─────────────────────────────────────────────────────────────
let _devVentaActual   = null;
let _devDetalles      = [];       // líneas de ventas_detalle con cantidad_max
let _devSelecciones   = {};       // { [detalle_uuid]: { cantidad, precio, ... } }
let _devCambioItems   = [];       // [{ code, name, price, quantity }]
let _devStep          = 1;
let _devMotivo        = '';
let _devTipoPago      = 'EFECTIVO';
let _devAllProducts   = [];
let _devAllClients    = [];
let _devLoading       = false;

// ─── Init ────────────────────────────────────────────────────────────────
async function initDevoluciones() {
    const db = getSupabaseClient();
    if (!db) return;

    // Fecha hoy
    document.getElementById('devFecha').value = new Date().toISOString().split('T')[0];

    // Cargar catálogos en paralelo
    const [prodRes, cliRes] = await Promise.allSettled([
        db.from('ferre_inventario').select('*').order('producto'),
        db.from('ferre_clientes').select('cedula, razon_social').order('razon_social')
    ]);
    _devAllProducts = prodRes.value?.data || [];
    _devAllClients  = cliRes.value?.data  || [];

    // Listeners
    document.getElementById('devFecha').addEventListener('change', devCargarLista);
    document.getElementById('devBuscarBtn').addEventListener('click', devCargarLista);
    document.getElementById('devBusqueda').addEventListener('keydown', e => {
        if (e.key === 'Enter') devCargarLista();
    });

    devCargarLista();
}

// ─── Lista ventas ────────────────────────────────────────────────────────
async function devCargarLista() {
    if (_devLoading) return;
    _devLoading = true;
    const db = getSupabaseClient();
    const lista = document.getElementById('devVentasList');
    lista.innerHTML = '<div class="dev-empty-state"><i class="fas fa-spinner fa-spin"></i><p>Cargando ventas…</p></div>';

    try {
        const fecha  = document.getElementById('devFecha').value;
        const busq   = document.getElementById('devBusqueda').value.trim();
        let query = db.from('ferre_ventas')
            .select('id, id_venta, fecha_hora_venta, cliente_id, total, tipo_pago, tipo, estado')
            .in('estado', ['COMPLETADO', 'AUTORIZADO', 'CAMBIADO'])
            .order('fecha_hora_venta', { ascending: false });

        if (busq) {
            query = query.ilike('id_venta', `%${busq}%`).limit(100);
        } else if (fecha) {
            const [y, m, d] = fecha.split('-').map(Number);
            const s = new Date(y, m - 1, d, 0, 0, 0, 0);
            const e = new Date(y, m - 1, d, 23, 59, 59, 999);
            query = query.gte('fecha_hora_venta', s.toISOString()).lte('fecha_hora_venta', e.toISOString());
        } else {
            const s = new Date(); s.setHours(0, 0, 0, 0);
            const e = new Date(); e.setHours(23, 59, 59, 999);
            query = query.gte('fecha_hora_venta', s.toISOString()).lte('fecha_hora_venta', e.toISOString());
        }

        const { data, error } = await query;
        if (error) throw error;
        devRenderLista(data || []);
    } catch (err) {
        lista.innerHTML = `<div class="dev-empty-state" style="color:#dc3545;"><i class="fas fa-exclamation-triangle"></i><p>${_esc(err.message)}</p></div>`;
    } finally {
        _devLoading = false;
    }
}

function devRenderLista(ventas) {
    const lista = document.getElementById('devVentasList');
    const bar   = document.getElementById('devResumenBar');

    if (!ventas.length) {
        lista.innerHTML = '<div class="dev-empty-state"><i class="fas fa-receipt"></i><p>Sin ventas para este criterio</p></div>';
        bar.classList.add('hidden');
        return;
    }

    bar.classList.remove('hidden');
    bar.innerHTML = `<strong>${ventas.length} venta${ventas.length > 1 ? 's' : ''}</strong> disponibles`;

    lista.innerHTML = '';
    ventas.forEach(v => {
        const hora = new Date(v.fecha_hora_venta).toLocaleTimeString('es-EC', { hour: '2-digit', minute: '2-digit' });
        const tp   = v.tipo_pago || 'EFECTIVO';
        const badgeClass = tp === 'TRANSFERENCIA' ? 'dev-badge-tr' : tp.startsWith('CR') ? 'dev-badge-cr' : 'dev-badge-ef';
        const cliente = v.cliente_id === '9999999999999' ? 'Consumidor Final'
            : (_devAllClients.find(c => c.cedula === v.cliente_id)?.razon_social || v.cliente_id);
        const esCambiado = v.estado === 'CAMBIADO';

        const card = document.createElement('div');
        card.className = 'dev-venta-card' + (_devVentaActual?.id === v.id ? ' activa' : '');
        card.innerHTML = `
            <div class="dev-venta-card-top">
                <span class="dev-venta-id">${_esc(v.id_venta)}</span>
                <span class="dev-venta-total">${formatCurrency(v.total)}</span>
            </div>
            <div class="dev-venta-card-bot">
                <span class="dev-venta-cliente">${_esc(cliente)}</span>
                <span class="dev-venta-meta">
                    ${esCambiado ? '<span class="dev-badge dev-badge-cambiado">CAMBIADO</span>' : ''}
                    <span class="dev-venta-hora">${hora}</span>
                    <span class="dev-badge ${badgeClass}">${_esc(tp)}</span>
                </span>
            </div>`;
        card.addEventListener('click', () => devAbrirGestion(v));
        lista.appendChild(card);
    });
}

// ─── Panel derecho: abrir gestión ────────────────────────────────────────
async function devAbrirGestion(v) {
    _devVentaActual  = v;
    _devDetalles     = [];
    _devSelecciones  = {};
    _devCambioItems  = [];
    _devStep         = 1;
    _devMotivo       = '';
    _devTipoPago     = 'EFECTIVO';

    // Resaltar card activa
    document.querySelectorAll('.dev-venta-card').forEach(c => c.classList.remove('activa'));
    event.currentTarget.classList.add('activa');

    const panel = document.getElementById('devGestionPanel');
    panel.innerHTML = '<div class="dev-panel-placeholder"><i class="fas fa-spinner fa-spin" style="font-size:2rem;opacity:.5;"></i></div>';

    const db = getSupabaseClient();
    try {
        const { data: detalles, error } = await db.from('ferre_ventas_detalle')
            .select('*')
            .eq('venta_id', v.id)
            .in('estado', ['ACTIVO', 'PARCIAL']);
        if (error) throw error;

        if (!detalles || detalles.length === 0) {
            panel.innerHTML = `<div class="card"><p style="color:#888;text-align:center;padding:2rem;">Esta venta no tiene ítems disponibles para devolver.</p></div>`;
            return;
        }

        // Enriquecer nombres
        const ids = [...new Set(detalles.map(d => d.producto_id))];
        const prodMap = {};
        ids.forEach(id => { const p = _devAllProducts.find(x => x.codigo === id); if (p) prodMap[id] = p; });
        const missing = ids.filter(id => !prodMap[id]);
        if (missing.length) {
            for (let i = 0; i < missing.length; i += 10) {
                const { data: prods } = await db.from('ferre_inventario').select('codigo,producto').in('codigo', missing.slice(i, i + 10));
                if (prods) prods.forEach(p => { prodMap[p.codigo] = { ...(prodMap[p.codigo] || {}), producto: p.producto }; });
            }
        }

        // Calcular máximos (descontando devoluciones previas)
        const detalleIds = detalles.map(d => d.id);
        const { data: prevDev } = await db.from('ferre_historial_devoluciones_detalle').select('detalle_id, cantidad_devuelta').in('detalle_id', detalleIds);
        const yaDevuelto = {};
        (prevDev || []).forEach(r => { yaDevuelto[r.detalle_id] = (yaDevuelto[r.detalle_id] || 0) + parseFloat(r.cantidad_devuelta); });

        _devDetalles = detalles.map(d => ({
            ...d,
            nombre: prodMap[d.producto_id]?.producto || d.producto_id,
            cantidad_max: Math.round((parseFloat(d.cantidad) - (yaDevuelto[d.id] || 0)) * 1000) / 1000
        })).filter(d => d.cantidad_max > 0);

        if (_devDetalles.length === 0) {
            panel.innerHTML = `<div class="card"><p style="color:#888;text-align:center;padding:2rem;">Todos los ítems de esta venta ya fueron devueltos.</p></div>`;
            return;
        }

        _devDetalles.forEach(d => {
            _devSelecciones[d.id] = { cantidad: 0, precio: parseFloat(d.precio), producto_id: d.producto_id, nombre: d.nombre, cantidad_max: d.cantidad_max, detalle_id: d.id, id_detalle: d.id_detalle };
        });

        devRenderStep1();

    } catch (err) {
        panel.innerHTML = `<div class="card"><p style="color:#dc3545;padding:1rem;">${_esc(err.message)}</p></div>`;
    }
}

// ─── Step 1: Cantidades a devolver ────────────────────────────────────────

        : (_devAllClients.find(c => c.cedula === v.cliente_id)?.razon_social || v.cliente_id);

    const itemsHtml = _devDetalles.map(d => {

                <span class="dev-info-cliente">${_esc(cliente)}</span>

                </button>
            </div>
        </div>`;

    document.getElementById('devMotivoInput').addEventListener('input', e => { _devMotivo = e.target.value; });
    devActualizarTotalesStep1();
}

function devAjustar(id, delta) {
    const sel = _devSelecciones[id];
    if (!sel) return;
    devSetQty(id, (sel.cantidad || 0) + delta);
}

function devSetQty(id, val) {
    const sel = _devSelecciones[id];
    if (!sel) return;
    let n = parseFloat(val) || 0;
    n = Math.round(Math.min(sel.cantidad_max, Math.max(0, n)) * 1000) / 1000;
    sel.cantidad = n;
    const inp = document.getElementById(`devQty_${id}`);
    if (inp) inp.value = n;
    const row = document.getElementById(`devRow_${id}`);
    if (row) row.classList.toggle('con-seleccion', n > 0);
    devActualizarTotalesStep1();
}

function devActualizarTotalesStep1() {
    const sel = Object.values(_devSelecciones).filter(x => x.cantidad > 0);
    const tot = sel.reduce((s, x) => s + x.cantidad * x.precio, 0);
    const el = document.getElementById('devStep1Totales');
    if (!el) return;
    if (sel.length > 0) {
        el.classList.remove('hidden');
        el.innerHTML = `<span><strong>${sel.length} ítem${sel.length > 1 ? 's' : ''}</strong> seleccionado${sel.length > 1 ? 's' : ''}</span><span style="color:#e67e22;font-weight:800;">Total a devolver: ${formatCurrency(tot)}</span>`;
    } else {
        el.classList.add('hidden');
    }
}

// ─── Pregunta tipo ───────────────────────────────────────────────────────
function devPasarStep2() {
    _devMotivo = document.getElementById('devMotivoInput')?.value || '';
    const sel = Object.values(_devSelecciones).filter(x => x.cantidad > 0);
    if (sel.length === 0) { showCustomAlert('Selecciona al menos un ítem a devolver', 'warning'); return; }
    const esTotalCompleto = _devDetalles.every(d => _devSelecciones[d.id]?.cantidad === d.cantidad_max);
    if (esTotalCompleto && _devCambioItems.length === 0) {
        devRenderPreguntaTipo();
    } else {
        devRenderStep2();
    }
}

function devFiltrarCambio(query) {
    const drop = document.getElementById('devCambioDropdown');
    if (!drop) return;
    if (!query) { drop.style.display = 'none'; return; }
    const q = query.toLowerCase();
    const matches = _devAllProducts.filter(p => (p.producto.toLowerCase().includes(q) || p.codigo.startsWith(query)) && p.stock > 0).slice(0, 10);
    if (!matches.length) {
        drop.innerHTML = '<div style="padding:.6rem 1rem;color:#aaa;font-size:.85rem;">Sin resultados con stock disponible</div>';
        drop.style.display = 'block';
        return;
    }
    drop.innerHTML = matches.map(p => `
        <div class="dev-drop-item" onclick="devAgregarCambio('${_esc(p.codigo)}')">
            <div>
                <div class="dev-drop-item-name">${_esc(p.producto)}</div>
                <div class="dev-drop-item-sub">Cód: ${_esc(p.codigo)} · Stock: ${p.stock}</div>
            </div>
            <span class="dev-drop-item-price">${formatCurrency(p.precio)}</span>
        </div>`).join('');
    drop.style.display = 'block';
}

function devAgregarCambio(codigo) {
    const prod = _devAllProducts.find(p => p.codigo === codigo);
    if (!prod) return;
    const ex = _devCambioItems.find(x => x.code === codigo);
    const stockDisp = prod.stock - (ex ? ex.quantity : 0);
    if (stockDisp <= 0) { showCustomAlert('Stock insuficiente para ese producto', 'warning'); return; }
    if (ex) { ex.quantity = Math.min(prod.stock, ex.quantity + 1); }
    else { _devCambioItems.push({ code: codigo, name: prod.producto, price: prod.precio, quantity: 1 }); }
    devRenderStep2();
}

function devElimCambio(idx) {
    _devCambioItems.splice(idx, 1);
    devRenderStep2();
}

function devSetTipoPago(tipo) {
    _devTipoPago = tipo;
    const ef = document.getElementById('devPagoEf');
    const tr = document.getElementById('devPagoTr');
    if (ef) ef.classList.toggle('activo', tipo === 'EFECTIVO');
    if (tr) tr.classList.toggle('activo', tipo === 'TRANSFERENCIA');
}

// ─── Confirmar ───────────────────────────────────────────────────────────
async function devConfirmar() {
    const confirmed = await showCustomConfirm(
        '¿Confirmar la operación? Esta acción no se puede deshacer.',
        'Confirmar', 'Sí, confirmar', 'Cancelar'
    );
    if (!confirmed) return;

    const btn = document.getElementById('devBtnFinal');
    if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando…'; }

    const db = getSupabaseClient();
    const sel = Object.values(_devSelecciones).filter(x => x.cantidad > 0);
    const totalDev = Math.round(sel.reduce((s, x) => s + x.cantidad * x.precio, 0) * 100) / 100;
    const totalCam = Math.round(_devCambioItems.reduce((s, x) => s + x.quantity * x.price, 0) * 100) / 100;
    const diferencia = Math.round((totalCam - totalDev) * 100) / 100;
    const tipo = _devCambioItems.length > 0 ? 'CAMBIO' : 'DEVOLUCION';

    try {
        // 1. Cabecera
        const { data: { user } } = await db.auth.getUser();
        const userEmail = user?.email || '';
        const idDevolucion = `DEV${Date.now()}`;

        const { data: devData, error: devErr } = await db.from('ferre_devoluciones').insert({
            id_devolucion: idDevolucion,
            venta_id: _devVentaActual.id,
            id_venta: _devVentaActual.id_venta,
            tipo,
            motivo: _devMotivo || null,
            total_devuelto: totalDev,
            total_cobrado: totalCam,
            diferencia,
            tipo_pago_diferencia: diferencia > 0.009 ? _devTipoPago : null,
            estado: 'COMPLETADO',
            usuario_email: userEmail
        }).select('id').single();
        if (devErr) throw devErr;

        const devolucionId = devData.id;

        // 2. Detalle de lo devuelto (triggers DB actualizan stock e inventario)
        const devRows = sel.map(x => {
            const orig = _devDetalles.find(d => d.id === x.detalle_id);
            return {
                detalle_id: x.detalle_id,
                id_detalle: x.id_detalle || '',
                venta_id: _devVentaActual.id,
                id_venta: _devVentaActual.id_venta,
                producto_id: x.producto_id,
                cantidad_original: parseFloat(orig?.cantidad || x.cantidad),
                cantidad_devuelta: x.cantidad,
                cantidad_restante: Math.max(0, Math.round((x.cantidad_max - x.cantidad) * 1000) / 1000),
                motivo: _devMotivo || null,
                usuario_email: userEmail,
                devolucion_id: devolucionId,
                precio_unitario: x.precio,
                subtotal_devuelto: Math.round(x.cantidad * x.precio * 100) / 100
            };
        });
        const { error: ddErr } = await db.from('ferre_historial_devoluciones_detalle').insert(devRows);
        if (ddErr) throw ddErr;

        // 3. Ítems de cambio entregados (trigger DB baja stock)
        if (_devCambioItems.length > 0) {
            const { error: cdErr } = await db.from('ferre_cambios_detalle').insert(
                _devCambioItems.map(x => ({ devolucion_id: devolucionId, producto_id: x.code, cantidad: x.quantity, precio: x.price, usuario_email: userEmail }))
            );
            if (cdErr) throw cdErr;
        }

        // 4. Auditoría
        const nuevoEstado = tipo === 'DEVOLUCION' ? 'DEVUELTO' : 'CAMBIADO';
        await db.from('ferre_historial_modificaciones_ventas').insert({
            venta_id: _devVentaActual.id,
            id_venta: _devVentaActual.id_venta,
            tipo_modificacion: tipo,
            motivo: _devMotivo || null,
            estado_anterior: _devVentaActual.estado,
            estado_nuevo: nuevoEstado,
            total_anterior: parseFloat(_devVentaActual.total),
            total_nuevo: parseFloat(_devVentaActual.total),
            usuario_email: userEmail
        });

        // 5. Éxito
        await showCustomAlert(
            tipo === 'DEVOLUCION'
                ? `✅ Devolución registrada correctamente.<br>Inventario actualizado automáticamente.`
                : `✅ Cambio registrado correctamente.<br>Inventario actualizado automáticamente.`,
            'success'
        );

        // Refrescar productos locales
        const { data: prods } = await db.from('ferre_inventario').select('*').order('producto');
        _devAllProducts = prods || [];

        // Resetear panel y recargar lista
        _devVentaActual = null;
        document.getElementById('devGestionPanel').innerHTML = `
            <div class="dev-panel-placeholder">
                <i class="fas fa-check-circle" style="color:#28a745;font-size:3rem;opacity:.6;"></i>
                <h3>Operación completada</h3>
                <p>Selecciona otra venta para continuar</p>
            </div>`;
        devCargarLista();

    } catch (err) {
        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-check"></i> Confirmar'; }
        await showCustomAlert(`Error al procesar: ${err.message}`, 'error');
    }
}

// ─── Utilidades locales ──────────────────────────────────────────────────
function _esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function _stepsBar(current) {
    const s = step => {
        const label = step === 1 ? '1. Cantidades' : step === 2 ? '2. Productos' : '3. Confirmar';
        const cls   = current === step ? 'activo' : (current > step ? 'completo' : '');
        return `<span class="dev-step-label ${cls}">${label}</span>`;
    };
    return `<div class="dev-steps-bar">${s(1)}<span class="dev-step-sep">›</span>${s(2)}<span class="dev-step-sep">›</span>${s(3)}</div>`;
}
</script>
