<!-- ── LOGIN SCREEN ── -->
<div id="loginScreen">
    <div class="login-card">
        <img src="https://i.ibb.co/8gLPXfjh/FERRISOLUCIONES-1.png" alt="Logo" class="login-logo" onerror="this.style.display='none'">
        <div class="login-title">Ferrisoluciones</div>
        <div class="login-subtitle">Punto de Venta Móvil</div>
        <form id="loginForm" autocomplete="on">
            <label class="label-form">Correo</label>
            <input type="email" id="loginEmail" placeholder="correo@empresa.com" autocomplete="email" required>
            <label class="label-form">Contraseña</label>
            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required>
            <button type="submit" class="btn-login" id="btnLogin"><i class="fas fa-sign-in-alt"></i> Entrar</button>
        </form>
        <div id="loginError" class="login-error hidden"></div>
        <div class="login-footer">Powered by LP Solutions</div>
    </div>
</div>
