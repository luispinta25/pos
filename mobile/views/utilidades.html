<!-- ── UTILIDADES SCREEN ── -->
<div id="utilidadesScreen" class="hidden">
    <header class="util-header">
        <button class="hist-back-btn" id="utilidadesBackBtn"><i class="fas fa-chevron-left"></i></button>
        <span class="util-header-title"><i class="fas fa-tools" style="color:var(--info);margin-right:6px;"></i>Utilidades</span>
    </header>
    <div class="util-content">
        <p class="util-section-title">Inventario</p>
        <div class="util-card" id="utilActualizarInventarioBtn">
            <div class="util-card-icon" style="background:linear-gradient(135deg,#d4a017,#b8880f);">
                <i class="fas fa-warehouse"></i>
            </div>
            <div class="util-card-body">
                <div class="util-card-title">Actualizar Inventario</div>
                <div class="util-card-desc">Modifica stock, zona, stock mínimo y proveedor</div>
            </div>
            <i class="fas fa-chevron-right util-card-arrow"></i>
        </div>
        <p class="util-section-title">Proveedores</p>
        <div class="util-card" id="utilActualizarProveedorBtn">
            <div class="util-card-icon" style="background:linear-gradient(135deg,#2196F3,#21CBF3);">
                <i class="fas fa-truck"></i>
            </div>
            <div class="util-card-body">
                <div class="util-card-title">Actualizar Proveedores</div>
                <div class="util-card-desc">Modifica vendedor y contacto de los proveedores</div>
            </div>
            <i class="fas fa-chevron-right util-card-arrow"></i>
        </div>
        <p class="util-section-title">Accesos</p>
        <div class="util-card" onclick="window.open('https://contabilidad.ferrisoluciones.com','_blank')">
            <div class="util-card-icon" style="background:linear-gradient(135deg,#00b09b,#96c93d);">
                <i class="fas fa-calculator"></i>
            </div>
            <div class="util-card-body">
                <div class="util-card-title">Ir a Contabilidad</div>
                <div class="util-card-desc">Accede al sistema contable externo</div>
            </div>
            <i class="fas fa-external-link-alt util-card-arrow"></i>
        </div>
    </div>
</div>
