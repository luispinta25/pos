<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferrisoluciones - Sistema de Gestión</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <link rel="icon" href="https://i.ibb.co/8gLPXfjh/FERRISOLUCIONES-1.png">
</head>
<body>

    
    <div id="loginScreen" class="login-screen">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <img src="https://i.ibb.co/8gLPXfjh/FERRISOLUCIONES-1.png" alt="Ferrisoluciones" class="login-logo">
                    <h1 class="login-title">Ferrisoluciones</h1>
                    <p class="login-subtitle">Sistema de Gestión Ferretería</p>
                </div>

                
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="loginEmail" class="form-label">Correo Electrónico</label>
                        <input type="email" id="loginEmail" class="form-input" placeholder="correo@ejemplo.com" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword" class="form-label">Contraseña</label>
                        <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-accent btn-block">
                        <span>Iniciar Sesión</span>
                    </button>
                    <div class="auth-toggle">
                        <p>¿No tienes cuenta? <a href="#" id="showRegister">Registrarse</a></p>
                    </div>
                </form>

                
                <form id="registerForm" class="auth-form hidden">
                    <div class="form-group">
                        <label for="registerNombres" class="form-label">Nombres</label>
                        <input type="text" id="registerNombres" class="form-input" placeholder="Juan" required>
                    </div>
                    <div class="form-group">
                        <label for="registerApellidos" class="form-label">Apellidos</label>
                        <input type="text" id="registerApellidos" class="form-input" placeholder="Pérez" required>
                    </div>
                    <div class="form-group">
                        <label for="registerEmail" class="form-label">Correo Electrónico</label>
                        <input type="email" id="registerEmail" class="form-input" placeholder="correo@ejemplo.com" required>
                    </div>
                    <div class="form-group">
                        <label for="registerPassword" class="form-label">Contraseña</label>
                        <input type="password" id="registerPassword" class="form-input" placeholder="Mínimo 6 caracteres" required>
                    </div>
                    <div class="form-group">
                        <label for="registerPasswordConfirm" class="form-label">Confirmar Contraseña</label>
                        <input type="password" id="registerPasswordConfirm" class="form-input" placeholder="Confirma tu contraseña" required>
                    </div>
                    <button type="submit" class="btn btn-accent btn-block">
                        <span>Crear Cuenta</span>
                    </button>
                    <div class="auth-toggle">
                        <p>¿Ya tienes cuenta? <a href="#" id="showLogin">Iniciar Sesión</a></p>
                    </div>
                </form>

                <div id="authMessage" class="auth-message hidden"></div>
            </div>
        </div>
    </div>

    
    <div id="appScreen" class="app-screen hidden">
        
        
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-brand">
                    <img src="https://i.ibb.co/8gLPXfjh/FERRISOLUCIONES-1.png" alt="Logo" class="nav-logo">
                    <span class="nav-title">Ferrisoluciones</span>
                </div>
                
                <div class="nav-menu">
                    <a href="#" class="nav-btn active" data-module="punto-venta" data-tooltip="Punto de venta" aria-label="Punto de venta">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="nav-btn-text" aria-hidden="true">Punto de venta</span>
                    </a>
                    <a href="#" class="nav-btn" data-module="ventas" data-tooltip="Historial de ventas" aria-label="Historial de ventas">
                        <i class="fas fa-history"></i>
                        <span class="nav-btn-text" aria-hidden="true">Historial de ventas</span>
                    </a>
                    <a href="#" class="nav-btn" data-module="gastos" data-tooltip="Registro de gastos" aria-label="Registro de gastos">
                        <i class="fas fa-receipt"></i>
                        <span class="nav-btn-text" aria-hidden="true">Registro de gastos</span>
                    </a>
                    <a href="#" class="nav-btn" data-module="proveedores" data-tooltip="Gestión de proveedores" aria-label="Gestión de proveedores">
                        <i class="fas fa-truck"></i>
                        <span class="nav-btn-text" aria-hidden="true">Gestión de proveedores</span>
                    </a>
                    <a href="#" class="nav-btn" data-module="cxc" data-tooltip="Cuentas por cobrar" aria-label="Cuentas por cobrar">
                        <i class="fas fa-wallet"></i>
                        <span class="nav-btn-text" aria-hidden="true">Cuentas por cobrar</span>
                    </a>
                </div>

                <div class="nav-user">
                    <div class="nav-total" id="navTotal">
                        <span class="total-label">Total:</span>
                        <span class="total-amount" id="navTotalAmount">$0.00</span>
                    </div>
                    <div class="user-info">
                        <div class="user-name" id="userName">Usuario</div>
                        <div class="user-role" id="userRole">Rol</div>
                    </div>
                    <button class="btn-logout" id="logoutBtn">Cerrar Sesión</button>
                </div>
            </div>
        </nav>

        
        <div id="moduleContainer" class="module-container">
        </div>

    </div>

    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const navButtons = document.querySelectorAll('.nav-btn');

            navButtons.forEach(button => {
                button.addEventListener('focus', () => button.classList.add('nav-btn-focused'));
                button.addEventListener('blur', () => button.classList.remove('nav-btn-focused'));
            });
        });
    </script>

    <style>
        .login-screen {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .login-logo {
            height: 80px;
            margin-bottom: 20px;
        }

        .login-title {
            font-size: 2em;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .login-subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .auth-form {
            margin-bottom: 20px;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .auth-toggle a {
            color: #d4a017;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-toggle a:hover {
            text-decoration: underline;
        }

        .btn-block {
            width: 100%;
            margin-top: 10px;
        }

        .auth-message {
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            margin-top: 15px;
        }

        .auth-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .auth-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .app-screen {
            min-height: 100vh;
        }

    </style>

</body>
</html>
