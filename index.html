<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferrisoluciones</title>
    <meta name="theme-color" content="#1a1a1a">
    <link rel="icon" href="pc/img/favicon.ico">
    <script>
        // =====================================================
        // DETECTOR DE DISPOSITIVO - redirige a pc/ o mobile/
        // Criterio: User Agent móvil OR pantalla <= 768px
        // =====================================================
        (function () {
            var ua = navigator.userAgent || '';
            var mobileUA = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|webOS/i.test(ua);
            var smallScreen = window.screen.width <= 768 || window.innerWidth <= 768;

            if (mobileUA || smallScreen) {
                window.location.replace('mobile/index.html');
            } else {
                window.location.replace('pc/index.html');
            }
        })();
    </script>
    <noscript>
        <meta http-equiv="refresh" content="0; url=pc/index.html">
    </noscript>
</head>

</body>
</html>
